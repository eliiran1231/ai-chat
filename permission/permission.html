<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src data:; connect-src 'none'; font-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permission request</title>
    <link rel="stylesheet" href="permission.css" />
  </head>
  <body>
    <main class="backdrop" aria-labelledby="permission-title" aria-describedby="permission-description">
      <section class="sheet" role="dialog" aria-modal="true">
        <div class="handle" aria-hidden="true"></div>
        <div class="icon" aria-hidden="true">⌁</div>
        <h1 id="permission-title"></h1>
        <p id="permission-description"></p>
        <div class="resource">
          <span>Requested location</span>
          <code id="permission-resource"></code>
        </div>
        <p class="notice">Only this request will be allowed. The agent cannot write files or run commands.</p>
        <div class="actions">
          <button id="deny" class="secondary" type="button" autofocus>Deny</button>
          <button id="approve" class="primary" type="button">Allow once</button>
        </div>
      </section>
    </main>
    <script src="permission.js"></script>
  </body>
</html>
