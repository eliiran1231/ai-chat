<section class="profile-page">
  <div class="profile-hero">
    <app-profile-avatar></app-profile-avatar>
    <h1>{{ displayName() }}</h1>
  </div>

  <div class="profile-sections">
    @for (row of profileRows(); track row.id) {
      <article class="profile-card">
        <div [class]="iconClass(row.id)" aria-hidden="true">
          <svg [lucideIcon]="rowIcons[row.id]"></svg>
        </div>
        <div class="profile-card__content">
          <h2>{{ row.label }}</h2>
          <p>{{ row.value }}</p>
        </div>
      </article>
    }
  </div>
</section>
