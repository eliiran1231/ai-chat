<section class="settings-page settings-overview" aria-label="Settings">
  <div class="settings-list">
    @for (category of categories(); track category.path) {
      <a class="settings-overview__item" [routerLink]="['/settings', category.path]">
        <svg [lucideIcon]="category.icon" class="settings-overview__icon" aria-hidden="true"></svg>
        <span>
          <strong>{{ category.title }}</strong>
          <small>{{ category.description }}</small>
        </span>
      </a>
    }
  </div>
</section>
