<section class="settings-page">
  <header class="settings-page__header">
    <span>{{ section().description }}</span>
  </header>

  @if (isProfileSection()) {
    <div class="settings-profile-hero">
      <app-profile-avatar></app-profile-avatar>
      <button
        type="button"
        class="settings-profile-edit"
        aria-label="Edit profile photo"
        (click)="profilePhotoInput.click()"
      >
        <svg [lucideIcon]="editIcon" aria-hidden="true"></svg>
      </button>
      <input
        #profilePhotoInput
        class="settings-profile-file"
        type="file"
        accept="image/*"
        (change)="onProfilePhotoSelected($event)"
      />
    </div>
  }

  <div class="settings-list">
    @for (row of section().rows; track row.label) {
      <article class="settings-row">
        <div class="settings-row__copy">
          <h3>{{ row.label }}</h3>
          <p>{{ rowDescription(row) }}</p>
        </div>

        @if (row.control !== 'info') {
          <div class="settings-row__control">
            @switch (row.control) {
              @case ('toggle') {
                <label class="settings-switch">
                  <input
                    type="checkbox"
                    [checked]="isToggleChecked(row)"
                    [disabled]="isControlDisabled(row)"
                    (change)="onToggleChange(row, $event)"
                  />
                  <span></span>
                </label>
              }
              @case ('select') {
                <select
                  [value]="selectValue(row)"
                  [disabled]="isControlDisabled(row)"
                  [attr.aria-label]="row.label"
                  (change)="onSelectChange(row, $event)"
                >
                  @for (option of row.options; track option) {
                    <option [value]="option">{{ option }}</option>
                  }
                </select>
              }
              @case ('range') {
                <input
                  class="settings-range"
                  type="range"
                  min="12"
                  max="22"
                  [value]="row.value"
                  [attr.aria-label]="row.label"
                />
              }
              @case ('button') {
                <button
                  type="button"
                  class="settings-action"
                  [class.settings-action--danger]="row.danger"
                  [disabled]="isControlDisabled(row)"
                  (click)="onButtonClick(row)"
                >
                  {{ row.value }}
                </button>
              }
            }
          </div>
        }
      </article>
    }
  </div>
</section>
