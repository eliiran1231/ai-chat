<header class="provider-auth__header">
  <div>
    <h2 id="provider-connect-dialog-title">Connect {{ context.provider.metadata.displayName }}</h2>
    <p>{{ context.provider.metadata.description }}</p>
  </div>

  <button
    type="button"
    class="provider-auth__close"
    aria-label="Close provider connection dialog"
    (click)="close()"
    [disabled]="busy()"
  >
    &times;
  </button>
</header>

<form class="provider-auth__form" (ngSubmit)="connect()">
  <label>
    Email
    <input
      type="email"
      autocomplete="email"
      [ngModel]="email()"
      (ngModelChange)="email.set($event); error.set(undefined)"
      name="provider-email"
      placeholder="you@example.com"
    />
  </label>

  <label>
    Password
    <input
      type="password"
      autocomplete="current-password"
      [ngModel]="password()"
      (ngModelChange)="password.set($event); error.set(undefined)"
      name="provider-password"
      placeholder="Password"
    />
  </label>

  <label>
    Display name
    <input
      type="text"
      autocomplete="name"
      [ngModel]="displayName()"
      (ngModelChange)="displayName.set($event); error.set(undefined)"
      name="provider-displayName"
      placeholder="Optional for sign up"
    />
  </label>

  @if (error()) {
    <p class="provider-auth__error">{{ error() }}</p>
  }

  <div class="provider-auth__actions">
    <button type="submit" [disabled]="busy()">
      {{ busy() ? 'Connecting...' : 'Connect' }}
    </button>
    <button type="button" class="provider-auth__secondary" (click)="createAccount()" [disabled]="busy()">
      Create account
    </button>
  </div>
</form>
