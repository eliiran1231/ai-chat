<header class="provider-auth__header">
  <div>
    <h2 id="provider-connect-dialog-title">{{ 'provider.connectProvider' | translate: { provider: context.provider.metadata.displayName } }}</h2>
    <p>{{ context.provider.metadata.description }}</p>
  </div>

  <button
    type="button"
    class="provider-auth__close"
    [attr.aria-label]="'provider.closeConnectionDialog' | translate"
    (click)="close()"
    [disabled]="busy()"
  >
    &times;
  </button>
</header>

<form class="provider-auth__form" (ngSubmit)="connect()">
  <label>
    {{ 'provider.email' | translate }}
    <input
      type="email"
      autocomplete="email"
      [ngModel]="email()"
      (ngModelChange)="email.set($event); error.set(undefined)"
      name="provider-email"
      placeholder="you@example.com"
    />
  </label>

  <label>
    {{ 'provider.password' | translate }}
    <input
      type="password"
      autocomplete="current-password"
      [ngModel]="password()"
      (ngModelChange)="password.set($event); error.set(undefined)"
      name="provider-password"
      [placeholder]="'provider.password' | translate"
    />
  </label>

  <label>
    {{ 'settings.profile.displayName' | translate }}
    <input
      type="text"
      autocomplete="name"
      [ngModel]="displayName()"
      (ngModelChange)="displayName.set($event); error.set(undefined)"
      name="provider-displayName"
      [placeholder]="'provider.optionalForSignup' | translate"
    />
  </label>

  @if (error()) {
    <p class="provider-auth__error">{{ error() }}</p>
  }

  <div class="provider-auth__actions">
    <button type="submit" [disabled]="busy()">
      {{ busy() ? ('provider.connecting' | translate) : ('provider.connect' | translate) }}
    </button>
    <button type="button" class="provider-auth__secondary" (click)="createAccount()" [disabled]="busy()">
      {{ 'provider.createAccount' | translate }}
    </button>
  </div>
</form>
