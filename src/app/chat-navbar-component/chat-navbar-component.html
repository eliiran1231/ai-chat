<header class="chat-navbar">
  @if (messageOptionsMode) {
    <div class="message-options-mode" [attr.aria-label]="language.t('chat.messageOptions')">
      <button
        type="button"
        class="back-button"
        [attr.aria-label]="language.t('chat.backToConversation')"
        [title]="language.t('chat.back')"
        (click)="messageOptionsClosed.emit()"
      >
        <lucide-angular [img]="backIcon" aria-hidden="true" />
      </button>

      <div class="message-options-spacer"></div>

      @if (!editMode && selectedMessage?.from === 'client') {
        <button
          type="button"
          class="icon-button"
          [attr.aria-label]="language.t('chat.editMessage')"
          [title]="language.t('chat.edit')"
          [disabled]="!canEditSelectedMessage"
          (click)="canEditSelectedMessage && selectedMessage && editMessage.emit(selectedMessage)"
        >
          <lucide-angular [img]="editIcon" aria-hidden="true" />
        </button>
      }
      @if (!editMode) {
        <button
          type="button"
          class="icon-button icon-button--danger"
          [attr.aria-label]="language.t('chat.deleteMessage')"
          [title]="language.t('chat.delete')"
          [disabled]="!selectedMessage?.deletable"
          (click)="selectedMessage && deleteMessage.emit(selectedMessage)"
        >
          <lucide-angular [img]="deleteIcon" aria-hidden="true" />
        </button>
      }
    </div>
  } @else if (searchMode) {
    <div id="search-mode-container">
      <div class="search-result-count" [class.search-result-count--empty]="!hasResults">
        {{ currentResultLabel }}
      </div>
      <div class="search-navigation" [attr.aria-label]="language.t('chat.searchNavigation')">
        <button
          type="button"
          class="search-nav-button"
          [disabled]="!hasResults"
          (click)="previousMatch.emit()"
          [attr.aria-label]="language.t('chat.previousMatch')"
        >
          <lucide-angular [img]="previousMatchIcon" aria-hidden="true" />
        </button>
        <button
          type="button"
          class="search-nav-button"
          [disabled]="!hasResults"
          (click)="nextMatch.emit()"
          [attr.aria-label]="language.t('chat.nextMatch')"
        >
          <lucide-angular [img]="nextMatchIcon" aria-hidden="true" />
        </button>
      </div>
      <div class="search-input-shell">
        <input
          #searchInput
          [value]="searchQuery"
          (input)="updateSearch($any($event.target).value)"
          (keydown)="onSearchKeydown($event)"
          type="text"
          [placeholder]="language.t('chat.searchInChat')"
          [attr.aria-label]="language.t('chat.searchInChat')"
        />
      </div>
      <button
        type="button"
        class="search-close-button"
        (click)="closeSearch()"
        [attr.aria-label]="language.t('chat.closeSearch')"
      >
        <lucide-angular [img]="closeSearchIcon" aria-hidden="true" />
      </button>
    </div>
  } @else {
    <div class="contact-block">
      @if (showBackButton) {
        <button
          type="button"
          class="back-button"
          [attr.aria-label]="language.t('chat.backToChatList')"
          (click)="back.emit()"
        >
          <lucide-angular [img]="backIcon" aria-hidden="true" />
        </button>
      }

      <div class="avatar" aria-hidden="true">{{ chat.avatar }}</div>
      <div class="contact-meta">
        <h1>{{ chat.name }}</h1>
        <p>{{ chat.status }}</p>
      </div>
    </div>

    <div class="navbar-actions" [attr.aria-label]="language.t('chat.actions')">
      <button
        type="button"
        class="icon-button"
        (click)="openSearch()"
        [attr.aria-label]="language.t('chat.searchConversation')"
      >
        <lucide-angular [img]="searchIcon" class="search-icon" aria-hidden="true" />
      </button>
      <app-menu
        class ="chat-menu"
        [menuIcon]="menuIcon"
        [items]="menuItems"
        [ariaLabel]="language.t('chat.actionsMenu')"
        (itemSelected)="onMenuItemSelected($event)"
      ></app-menu>
    </div>
  }
</header>
