<header class="chat-navbar">
  @if (searchMode) {
    <div id="search-mode-container">
      <div class="search-result-count" [class.search-result-count--empty]="!hasResults">
        {{ currentResultLabel }}
      </div>
      <div class="search-navigation" aria-label="Search navigation">
        <button
          type="button"
          class="search-nav-button"
          [disabled]="!hasResults"
          (click)="previousMatch.emit()"
          aria-label="Previous match"
        >
          <lucide-angular [img]="previousMatchIcon" aria-hidden="true" />
        </button>
        <button
          type="button"
          class="search-nav-button"
          [disabled]="!hasResults"
          (click)="nextMatch.emit()"
          aria-label="Next match"
        >
          <lucide-angular [img]="nextMatchIcon" aria-hidden="true" />
        </button>
      </div>
      <div class="search-input-shell">
        <input
          #searchInput
          [value]="searchQuery"
          (input)="updateSearch($any($event.target).value)"
          (keydown)="onSearchKeydown($event)"
          type="text"
          placeholder="Search in chat"
          aria-label="Search in chat"
        />
      </div>
      <button
        type="button"
        class="search-close-button"
        (click)="closeSearch()"
        aria-label="Close search"
      >
        <lucide-angular [img]="closeSearchIcon" aria-hidden="true" />
      </button>
    </div>
  } @else {
    <div class="contact-block">
      @if (showBackButton) {
        <button
          type="button"
          class="back-button"
          aria-label="Back to chat list"
          (click)="back.emit()"
        >
          <lucide-angular [img]="backIcon" aria-hidden="true" />
        </button>
      }

      <div class="avatar" aria-hidden="true">{{ chat.avatar }}</div>
      <div class="contact-meta">
        <h1>{{ chat.name }}</h1>
        <p>{{ chat.status }}</p>
      </div>
    </div>

    <div class="navbar-actions" aria-label="Chat actions">
      <button
        type="button"
        class="icon-button"
        (click)="openSearch()"
        aria-label="Search conversation"
      >
        <lucide-angular [img]="searchIcon" class="search-icon" aria-hidden="true" />
      </button>
      <app-menu
        class ="chat-menu"
        [menuIcon]="menuIcon"
        [items]="menuItems"
        (itemSelected)="onMenuItemSelected($event)"
      ></app-menu>
    </div>
  }
</header>
