<section class="provider-list" [attr.aria-label]="'provider.chatProviders' | translate">
  <app-sidebar-search
    [searchTerm]="searchTerm()"
    [placeholder]="'provider.searchProviders' | translate"
    [ariaLabel]="'provider.searchProviders' | translate"
    (searchTermChange)="searchTerm.set($event)"
  />

  @if (providers.length === 0) {
    <p class="provider-list__empty">{{ 'provider.noneRegistered' | translate }}</p>
  } @else {
      @for (provider of filteredProviders(); track provider.metadata.id) {
        <app-provider-card
          [metadata]="provider.metadata"
          [secondaryText]="secondaryText(provider)"
          [buttonText]="actionText(provider)"
          [disabled]="isBusy(provider)"
          [error]="errorFor(provider)"
          (action)="handleAction(provider)"
        />
      } @empty {
        <p class="provider-list__empty">{{ 'provider.noSearchResults' | translate }}</p>
      }
  }
</section>
