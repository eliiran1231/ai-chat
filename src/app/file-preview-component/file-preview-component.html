<section class="file-preview-shell">
  <button
    type="button"
    class="close-button"
    [attr.aria-label]="'filePreview.close' | translate"
    (click)="closePreview()"
  >
    x
  </button>

  <div class="preview-stage">
    @if(processedFileUrl()){
      @if(file.type.startsWith('image')){
        <img class="preview-image" [src]="processedFileUrl()" [alt]="fileAlt" />
      }
      @else {
        <div class="file-details">
          <h3 class="file-name">{{ fileInfo.name }}</h3>
          <p class="file-size">{{ 'filePreview.size' | translate }}: {{ fileInfo.size | filesize }}</p>
          <p class="file-extension">{{ 'filePreview.type' | translate }}: {{ fileInfo.extension }}</p>
        </div>
      }
    }
    @else {
      <div id="loading-preview">{{ 'filePreview.loading' | translate }}</div>
    }
  </div>

  <app-chat-input-component
    theme="dark"
    (messageSubmit)="submitFile($event)"
    (fileSubmit)="changeFile($event)"
    [requiredContent]=false
  ></app-chat-input-component>
</section>
