<section class="file-preview-shell">
  <button
    type="button"
    class="close-button"
    aria-label="Close file preview"
    (click)="closePreview()"
  >
    x
  </button>

  <div class="preview-stage">
    @if(processedFileUrl()){
      @if(file.type.startsWith('image')){
        <img width="100%" [src]="processedFileUrl()" [alt]="fileAlt" />
      }
      @else {
        <div class="file-details">
          <h3 class="file-name">{{ fileInfo.name }}</h3>
          <p class="file-size">size: {{ fileInfo.size | filesize }}</p>
          <p class="file-extension">type: {{ fileInfo.type }}</p>
        </div>
      }
    }
    @else {
      <div id="loading-preview">loading...</div>
    }
  </div>

  <form class="composer-bar" (ngSubmit)="submitFile()">
    <button type="button" class="composer-icon" aria-label="Magic tools">*</button>

    <label class="composer-field" for="file-caption">
      <textarea
        id="file-caption"
        name="caption"
        rows="1"
        [(ngModel)]="caption"
        placeholder="Write a caption..."
      ></textarea>
    </label>

    <button type="button" class="composer-attach" aria-label="Add media">+</button>

    <button
      type="submit"
      class="send-button"
      aria-label="Send file with caption"
      [disabled]="!processedFileUrl()">
      <span>&gt;</span>
    </button>
  </form>
</section>
