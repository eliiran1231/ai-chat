<section class="file-preview-shell">
  <button
    type="button"
    class="close-button"
    [attr.aria-label]="'file.closePreview' | translate"
    (click)="closePreview()"
  >
    x
  </button>

  <div class="preview-stage">
    @if(processedFileUrl()){
      @if(currentFile().type.startsWith('image')){
        <img class="preview-image" [src]="processedFileUrl()" [alt]="resolvedFileAlt()" />
      }
      @else {
        @if (fileInfo(); as info) {
        <div class="file-details">
          <h3 class="file-name">{{ info.name }}</h3>
          <p class="file-size">{{ 'file.size' | translate }}: {{ info.size | filesize }}</p>
          <p class="file-extension">{{ 'file.type' | translate }}: {{ info.extension }}</p>
        </div>
        }
      }
    }
    @else {
      <div id="loading-preview">{{ 'common.loading' | translate }}</div>
    }
  </div>

  <app-chat-input-component
    theme="dark"
    [(caption)]="caption"
    (messageSubmit)="submitFile($event)"
    (fileSubmit)="changeFile($event)"
    [requiredContent]=false
  ></app-chat-input-component>
</section>
