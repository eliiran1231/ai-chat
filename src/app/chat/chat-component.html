@if(attachmentFile){
  <app-file-preview-component [file]="attachmentFile" [processFileUrl]="(file)=>chat.processFileUrl(file)" (submitted)="closePreviewPage(); sendMessage($event)" (closed)="closePreviewPage()"></app-file-preview-component>
}
@else if (chat; as activeChat) {
  <section class="chat-shell">
    <app-chat-navbar-component
      [chat]="activeChat"
      [showBackButton]="showBackButton"
      (back)="back.emit()"
    ></app-chat-navbar-component>

    <main class="chat-thread" aria-label="Conversation">
      @for (message of activeChat.messages; track message.id) {
        <app-message-bubble
          [message]="message"
          (answerSelected)="selectAnswer($event)"
        ></app-message-bubble>
      } @empty {
        <div class="empty-state">
          <p>No messages yet</p>
        </div>
      }
    </main>

    <app-chat-input-component
      theme="light"
      [chat]="activeChat"
      (messageSubmit)="sendMessage($event)"
      (fileSubmit)="openPreviewPage($event)"
    ></app-chat-input-component>
  </section>
} @else {
  <section class="chat-placeholder">
    <div class="chat-placeholder__card">
      <div class="chat-placeholder__icon">WA</div>
      <h2>Select a chat</h2>
      <p>Pick an existing conversation or create a new one from the sidebar.</p>
    </div>
  </section>
}
