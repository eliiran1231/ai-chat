@if(attachmentFile){
  <app-file-preview-component [file]="attachmentFile" [processFileUrl]="(file)=>chat.processFileUrl(file)" (submitted)="closePreviewPage(); sendMessage($event)" (closed)="closePreviewPage()"></app-file-preview-component>
}
@else if (chat; as activeChat) {
  <section class="chat-shell">
    <app-chat-navbar-component
      [chat]="activeChat"
      [showBackButton]="showBackButton"
      [resultCount]="matchingMessageIds.length"
      [currentResultIndex]="activeSearchResultIndex"
      (back)="back.emit()"
      (searchChange)="updateSearch($event)"
      (nextMatch)="stepInSearch(1)"
      (previousMatch)="stepInSearch(-1)"
      (searchClosed)="clearSearch()"
    ></app-chat-navbar-component>

    <ng-scrollbar
      #chatScrollbar
      reachedBottomOffset="40"
      droppedBottomOffset="40"
      (droppedBottom)="showScrollButton()"
      (reachedBottom)="hideScrollButton()"
      appearance="compact"
      class="chat-thread"
    >
      @for (message of activeChat.messages; track message.id) {
        <app-message-bubble
          [message]="message"
          [isActiveSearchMatch]="isActiveSearchMatch(message.id)"
          [searchTerm]="searchQuery"
          (answerSelected)="selectAnswer($event)"
        ></app-message-bubble>
      } @empty {
        <div class="empty-state">
          <p>No messages yet</p>
        </div>
      }
    </ng-scrollbar>

    @if (hasScrollButton) {
      <button
        type="button"
        class="scroll-bottom-button"
        aria-label="Scroll to bottom"
        (click)="scrollToBottom()"
      >
        <span aria-hidden="true">⌄</span>
      </button>
    }

    <app-chat-input-component
      theme="light"
      [chat]="activeChat"
      (messageSubmit)="sendMessage($event)"
      (fileSubmit)="openPreviewPage($event)"
    ></app-chat-input-component>
  </section>
} @else {
  <section class="chat-placeholder">
    <div class="chat-placeholder__card">
      <div class="chat-placeholder__icon">WA</div>
      <h2>Select a chat</h2>
      <p>Pick an existing conversation or create a new one from the sidebar.</p>
    </div>
  </section>
}
