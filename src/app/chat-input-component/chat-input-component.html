<form
  #chatForm="ngForm"
  class="chat-composer"
  [class.chat-composer--dark]="theme() === 'dark'"
  [class.chat-composer--light]="theme() !== 'dark'"
  [class.chat-composer--compact]="!allowAttachments()"
  (ngSubmit)="submitMessage(chatForm); syncComposerOverflow(autosize, messageInput)"
>
  @if (allowAttachments()) {
    <button (click)="pickFile()" type="button" class="composer-action composer-action--icon" aria-label="Attach file" [disabled]="disabled()">
      <svg [lucideIcon]="attachIcon" aria-hidden="true"></svg>
    </button>
    <button type="button" class="composer-action" aria-label="Emoji" [disabled]="disabled()">:)</button>
  }

  <label class="composer-field" for="message-input">
    <textarea
      #messageInput
      #autosize="cdkTextareaAutosize"
      id="message-input"
      rows="1"
      name="message"
      cdkTextareaAutosize
      cdkAutosizeMinRows="1"
      [cdkAutosizeMaxRows]="composerMaxRows"
      [style.--composer-max-rows]="composerMaxRows"
      [style.overflow-y]="composerHasOverflow() ? 'auto' : 'hidden'"
      [ngModel]="caption()"
      (ngModelChange)="caption.set($event)"
      (input)="syncComposerOverflow(autosize, messageInput)"
      (keydown)="handleComposerKeydown($event)"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      autocomplete="off"
    ></textarea>
  </label>

  @if (running()) {
    <button
      type="button"
      class="send-button send-button--stop"
      aria-label="Stop response"
      [disabled]="disabled() && !running()"
      (click)="stopRequested.emit()"
    >
      <svg [lucideIcon]="stopIcon" aria-hidden="true"></svg>
    </button>
  } @else {
    <button
      type="submit"
      class="send-button"
      aria-label="Send message"
      [disabled]="disabled() || (requiredContent() && !caption().trim())"
    >
      <svg [lucideIcon]="sendIcon" aria-hidden="true"></svg>
    </button>
  }
</form>
