<form
  #chatForm="ngForm"
  class="chat-composer"
  (ngSubmit)="submitMessage(chatForm); syncComposerOverflow(autosize, messageInput)"
>
  <button type="button" class="composer-action" aria-label="Attach file">+</button>
  <button type="button" class="composer-action" aria-label="Emoji">:)</button>

  <label class="composer-field" for="message-input">
    <textarea
      #messageInput
      #autosize="cdkTextareaAutosize"
      id="message-input"
      rows="1"
      name="message"
      cdkTextareaAutosize
      cdkAutosizeMinRows="1"
      [cdkAutosizeMaxRows]="composerMaxRows"
      [style.--composer-max-rows]="composerMaxRows"
      [style.overflow-y]="composerHasOverflow ? 'auto' : 'hidden'"
      [(ngModel)]="chat.draftMessage"
      (input)="syncComposerOverflow(autosize, messageInput)"
      (keydown)="handleComposerKeydown($event)"
      placeholder="Type a message"
      autocomplete="off"
    ></textarea>
  </label>

  <button
    type="submit"
    class="send-button"
    aria-label="Send message"
    [disabled]="!chat.draftMessage.trim()"
  >
    >
  </button>
</form>
