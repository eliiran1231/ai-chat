<form
  #chatForm="ngForm"
  class="chat-composer"
  [class.chat-composer--dark]="theme === 'dark'"
  [class.chat-composer--light]="theme !== 'dark'"
  [class.chat-composer--compact]="!allowAttachments"
  (ngSubmit)="submitMessage(chatForm); syncComposerOverflow(autosize, messageInput)"
>
  @if (allowAttachments) {
    <button
      (click)="pickFile()"
      type="button"
      class="composer-action composer-action--icon"
      [attr.aria-label]="'composer.attachFile' | translate"
    >
      <lucide-angular [img]="attachIcon" aria-hidden="true" />
    </button>
    <button type="button" class="composer-action" [attr.aria-label]="'composer.emoji' | translate">:)</button>
  }

  <label class="composer-field" for="message-input">
    <textarea
      #messageInput
      #autosize="cdkTextareaAutosize"
      id="message-input"
      rows="1"
      name="message"
      cdkTextareaAutosize
      cdkAutosizeMinRows="1"
      [cdkAutosizeMaxRows]="composerMaxRows"
      [style.--composer-max-rows]="composerMaxRows"
      [style.overflow-y]="composerHasOverflow ? 'auto' : 'hidden'"
      [(ngModel)]="caption"
      (input)="syncComposerOverflow(autosize, messageInput)"
      (keydown)="handleComposerKeydown($event)"
      [placeholder]="placeholder || ('chat.typeMessage' | translate)"
      autocomplete="off"
    ></textarea>
  </label>

  <button
    type="submit"
    class="send-button"
    [attr.aria-label]="'composer.sendMessage' | translate"
    [disabled]="requiredContent && !caption.trim()"
  >
    <lucide-angular [img]="sendIcon" aria-hidden="true" />
  </button>
</form>
