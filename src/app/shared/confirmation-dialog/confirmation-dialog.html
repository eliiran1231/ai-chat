<section class="confirmation-dialog" role="dialog" aria-labelledby="confirmation-dialog-title">
  <h2 id="confirmation-dialog-title">{{ data.title }}</h2>
  <p>{{ data.message }}</p>

  <footer>
    <button type="button" class="confirmation-dialog__cancel" (click)="cancel()">
      {{ data.cancelText ?? ('common.cancel' | translate) }}
    </button>
    <button
      type="button"
      class="confirmation-dialog__confirm"
      [class.confirmation-dialog__confirm--danger]="data.danger"
      (click)="confirm()"
    >
      {{ data.confirmText ?? ('common.confirm' | translate) }}
    </button>
  </footer>
</section>
