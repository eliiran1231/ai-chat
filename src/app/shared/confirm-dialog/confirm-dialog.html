<section class="confirm-dialog" role="dialog" aria-modal="true">
  <h2>{{ data.title }}</h2>
  <p>{{ data.message }}</p>

  <div class="confirm-dialog__actions">
    <button type="button" class="confirm-dialog__button" (click)="cancel()">
      {{ data.cancelLabel }}
    </button>
    <button
      type="button"
      class="confirm-dialog__button confirm-dialog__button--confirm"
      [class.confirm-dialog__button--danger]="data.danger"
      (click)="confirm()"
    >
      {{ data.confirmLabel }}
    </button>
  </div>
</section>
