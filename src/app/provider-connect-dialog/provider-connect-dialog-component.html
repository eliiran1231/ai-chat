@if (isShown()) {
  <section
    class="provider-dialog"
    animate.enter="provider-dialog-enter"
    animate.leave="provider-dialog-leave"
    (animationend)="finishClose()"
  >
    <ng-container
      *ngComponentOutlet="data.provider.metadata.authenticationComponent; injector: authenticationInjector"
    />
  </section>
}
