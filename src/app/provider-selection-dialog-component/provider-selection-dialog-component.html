<div class="provider-selection-dialog__list">
  @for (provider of data.providers; track provider.metadata.id) {
    <app-provider-card
      [metadata]="provider.metadata"
      [secondaryText]="provider.metadata.description"
      [buttonText]="'provider.createChat' | translate"
      (action)="selectProvider(provider)"
    />
  } @empty {
    <p class="provider-selection-dialog__empty">{{ 'provider.noneAvailable' | translate }}</p>
  }
</div>
