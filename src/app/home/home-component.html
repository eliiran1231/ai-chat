<section class="whatsapp-layout" [class.whatsapp-layout--mobile-chat]="selectedChat">
  <aside class="chat-sidebar">
    <header class="mobile-appbar">
      <div class="brand-row">
        <div class="brand-title">
          @if (whatsappLogoUrl) {
            <img class="brand-title__logo" [src]="whatsappLogoUrl" alt="WhatsApp logo" />
          }
          <h1>WhatsApp</h1>
        </div>
        <div class="sidebar-actions">
          <button
            type="button"
            class="sidebar-icon-button"
            aria-label="Menu"
            [attr.aria-expanded]="isMenuOpen"
            (click)="toggleMenu($event)"
          >
            <lucide-angular [img]="menuIcon" class="sidebar-icon"></lucide-angular>
          </button>

          @if (isMenuOpen) {
            <div class="sidebar-menu" (click)="$event.stopPropagation()">
              <button type="button" class="sidebar-menu__item" (click)="toggleFullscreen()">
                <lucide-angular
                  [img]="isFullscreen ? exitFullscreenIcon : enterFullscreenIcon"
                  class="sidebar-menu__icon"
                ></lucide-angular>
                {{ isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen' }}
              </button>
            </div>
          }
        </div>
      </div>

      <nav class="top-tabs" aria-label="Primary sections">
        <button
          type="button"
          [ngClass]="{ 'top-tab': true, 'top-tab--active': selectedTab === 'profile' }"
          (click)="selectedTab = 'profile'"
        >
          profile
        </button>
        <button
          type="button"
          [ngClass]="{ 'top-tab': true, 'top-tab--active': selectedTab === 'chats' }"
          (click)="selectedTab = 'chats'"
        >
          Chats
          @if (unreadChatsCount > 0) {
            <span class="top-tab__badge">{{ unreadChatsCount }}</span>
          }
        </button>
        <button
          type="button"
          [ngClass]="{ 'top-tab': true, 'top-tab--active': selectedTab === 'calls' }"
          (click)="selectedTab = 'calls'"
        >
          Calls
        </button>
      </nav>
    </header>

    @if (selectedTab === 'chats') {
      <app-chat-list-component
        [chats]="chats"
        [searchTerm]="searchTerm"
        [selectedChat]="selectedChat"
        (searchTermChange)="searchTerm = $event"
        (openChat)="openChat($event)"
        (deleteChat)="deleteChat($event)"
        (createChat)="createNewChat()"
        [deletingChatId]="deletingChatId"
      ></app-chat-list-component>
    } @else if (selectedTab == 'profile') {
      <app-profile-component></app-profile-component>
    } @else if (selectedTab == 'calls') {
      <!-- <app-calls-component></app-calls-component> -->
    }
  </aside>

  <section class="chat-stage">
    <app-chat [chat]="selectedChat" [showBackButton]="true" (back)="closeChat()" />
  </section>
</section>
