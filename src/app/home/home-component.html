<section class="whatsapp-layout" [class.whatsapp-layout--mobile-chat]="selectedChat">
  <aside class="chat-sidebar">
    <header class="mobile-appbar">
      <div class="brand-row">
        <h1>WhatsApp</h1>
        <div class="sidebar-actions">
          <button type="button" class="sidebar-icon-button" aria-label="Menu">...</button>
        </div>
      </div>

      <nav class="top-tabs" aria-label="Primary sections">
        <button type="button" class="top-tabs__icon">grp</button>
        <button type="button" class="top-tab top-tab--active">
          Chats
          <span class="top-tab__badge">1</span>
        </button>
        <button type="button" class="top-tab">Calls</button>
      </nav>
    </header>

    <div class="sidebar-tools">
      <label class="search-box" for="chat-search">
        <span class="search-box__icon">O</span>
        <input
          id="chat-search"
          type="text"
          name="chat-search"
          [(ngModel)]="searchTerm"
          placeholder="Search or start a new chat"
        />
      </label>
    </div>

    <app-chat-list-component
      [chats]="chats"
      [searchTerm]="searchTerm"
      [selectedChat]="selectedChat"
      (openChat)="openChat($event)"
      (deleteChat)="deleteChat($event)"
      [deletingChatId]="deletingChatId"
    ></app-chat-list-component>

    <button type="button" class="floating-compose" aria-label="New chat" (click)="createNewChat()">
      +
    </button>
  </aside>

  <section class="chat-stage">
    <app-chat [chat]="selectedChat" [showBackButton]="true" (back)="closeChat()" />
  </section>
</section>
