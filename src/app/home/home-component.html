<section class="whatsapp-layout" [class.whatsapp-layout--mobile-chat]="selectedChat">
  <aside class="chat-sidebar">
    <header class="mobile-appbar">
      <div class="brand-row">
        <h1>WhatsApp</h1>
        <div class="sidebar-actions">
          <button type="button" class="sidebar-icon-button" aria-label="Menu">...</button>
        </div>
      </div>

      <nav class="top-tabs" aria-label="Primary sections">
        <button type="button" 
          [ngClass]="{'top-tab': true, 'top-tab--active': selectedTab === 'profile'}"
          (click)="selectedTab = 'profile'"
        >
          profile
        </button>
        <button type="button" 
          [ngClass]="{'top-tab': true, 'top-tab--active': selectedTab === 'chats'}"
          (click)="selectedTab = 'chats'"
        >
          Chats
          <span class="top-tab__badge">1</span>
        </button>
        <button type="button" 
          [ngClass]="{'top-tab': true, 'top-tab--active': selectedTab === 'calls'}"
          (click)="selectedTab = 'calls'"
        >
          Calls
        </button>
      </nav>
    </header>

    @if(selectedTab === 'chats') {
      <app-chat-list-component
        [chats]="chats"
        [searchTerm]="searchTerm"
        [selectedChat]="selectedChat"
        (searchTermChange)="searchTerm = $event"
        (openChat)="openChat($event)"
        (deleteChat)="deleteChat($event)"
        (createChat)="createNewChat()"
        [deletingChatId]="deletingChatId"
      ></app-chat-list-component>
    }
    @else if (selectedTab == 'profile') {
      <app-profile-component></app-profile-component>
    }
    @else if (selectedTab == 'calls') {
      <!-- <app-calls-component></app-calls-component> -->
    }
  </aside>

  <section class="chat-stage">
    <app-chat [chat]="selectedChat" [showBackButton]="true" (back)="closeChat()" />
  </section>
</section>
