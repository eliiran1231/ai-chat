<section class="whatsapp-layout" [class.whatsapp-layout--mobile-chat]="selectedChat">
  <aside class="chat-sidebar">
    <header class="mobile-appbar">
      <div class="brand-row">
        <div class="brand-title">
          @if (whatsappLogoUrl) {
            <img
              class="brand-title__logo"
              [src]="whatsappLogoUrl"
              [alt]="language.t('app.whatsappLogoAlt')"
            />
          }
          <h1>WhatsApp</h1>
        </div>
        <app-sidebar-menu
          [isFullscreen]="isFullscreen"
          [menuIcon]="menuIcon"
          [enterFullscreenIcon]="enterFullscreenIcon"
          [exitFullscreenIcon]="exitFullscreenIcon"
          (fullscreenToggled)="toggleFullscreen()"
        ></app-sidebar-menu>
      </div>

      <nav class="top-tabs" [attr.aria-label]="language.t('tabs.primarySections')">
        <button
          type="button"
          class="top-tab"
          [class.top-tab--active]="selectedTab === 'profile'"
          (click)="selectedTab = 'profile'"
        >
          {{ language.t('tabs.profile') }}
        </button>
        <button
          type="button"
          class="top-tab"
          [class.top-tab--active]="selectedTab === 'chats'"
          (click)="selectedTab = 'chats'"
        >
          {{ language.t('tabs.chats') }}
          @if (unreadChatsCount > 0) {
            <span class="top-tab__badge">{{ unreadChatsCount }}</span>
          }
        </button>
        <button
          type="button"
          class="top-tab"
          [class.top-tab--active]="selectedTab === 'calls'"
          (click)="selectedTab = 'calls'"
        >
          {{ language.t('tabs.calls') }}
        </button>
      </nav>
    </header>

    @if(selectedTab === 'chats') {
      <app-chat-list-component
        [chats]="chats"
        [searchTerm]="searchTerm"
        [selectedChat]="selectedChat"
        (searchTermChange)="searchTerm = $event"
        (openChat)="openChat($event)"
        (createChat)="createNewChat()"
      ></app-chat-list-component>
    }
    @else if (selectedTab === 'profile') {
      <app-profile-component></app-profile-component>
    }
    @else if (selectedTab === 'calls') {
      <!-- <app-calls-component></app-calls-component> -->
    }
  </aside>

  <section class="chat-stage">
    @if(selectedChat){
      <app-chat [chat]="selectedChat" [showBackButton]="true" (back)="closeChat()" (deleteChat)="deleteChat($event)" />
    }
    @else {
      <section class="chat-placeholder">
        <div class="chat-placeholder__card">
          <div class="chat-placeholder__icon">WA</div>
          <h2>{{ language.t('placeholder.selectChatTitle') }}</h2>
          <p>{{ language.t('placeholder.selectChatBody') }}</p>
        </div>
      </section>
    }
  </section>
</section>
