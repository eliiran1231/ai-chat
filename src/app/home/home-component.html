<section class="whatsapp-layout" [class.whatsapp-layout--mobile-chat]="chatService.selectedChat()">
  <aside class="chat-sidebar">
    <header class="mobile-appbar">
      <div class="brand-row">
        <div class="brand-title">
          @if (whatsappLogoUrl()) {
            <img class="brand-title__logo" [src]="whatsappLogoUrl()" alt="WhatsApp logo" />
          }
          <h1>WhatsApp</h1>
        </div>
        <app-sidebar-menu
          [isFullscreen]="isFullscreen()"
          [menuIcon]="menuIcon"
          [enterFullscreenIcon]="enterFullscreenIcon"
          [exitFullscreenIcon]="exitFullscreenIcon"
          (fullscreenToggled)="toggleFullscreen()"
        ></app-sidebar-menu>
      </div>

      <nav class="top-tabs" aria-label="Primary sections">
        <button
          type="button"
          class="top-tab"
          [class.top-tab--active]="selectedTab() === 'profile'"
          (click)="selectedTab.set('profile')"
        >
          profile
        </button>
        <button
          type="button"
          class="top-tab"
          [class.top-tab--active]="selectedTab() === 'chats'"
          (click)="selectedTab.set('chats')"
        >
          Chats
          @if (unreadChatsCount() > 0) {
            <span class="top-tab__badge">{{ unreadChatsCount() }}</span>
          }
        </button>
        <button
          type="button"
          class="top-tab"
          [class.top-tab--active]="selectedTab() === 'calls'"
          (click)="selectedTab.set('calls')"
        >
          Calls
        </button>
      </nav>
    </header>

    @if(selectedTab() === 'chats') {
      <app-chat-list-component
        [chats]="chats()"
        [searchTerm]="searchTerm()"
        [selectedChat]="chatService.selectedChat()"
        (searchTermChange)="searchTerm.set($event)"
        (openChat)="openChat($event)"
        (createChat)="createChat()"
      ></app-chat-list-component>
    }
    @else if (selectedTab() === 'profile') {
      <app-profile-component></app-profile-component>
    }
    @else if (selectedTab() === 'calls') {
      <!-- <app-calls-component></app-calls-component> -->
    }
  </aside>

  <section class="chat-stage">
    @if(chatService.selectedChat(); as chat){
      <app-chat
       [chat]="chat" 
       [showBackButton]="true" 
       (back)="closeChat()" 
       (deleteChat)="deleteChat($event)" 
      />
    }
    @else {
      <section class="chat-placeholder">
        <div class="chat-placeholder__card">
          <div class="chat-placeholder__icon">WA</div>
          <h2>Select a chat</h2>
          <p>Pick an existing conversation or create a new one from the sidebar.</p>
        </div>
      </section>
    }
  </section>
</section>
