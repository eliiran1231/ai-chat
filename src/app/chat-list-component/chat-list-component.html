<div class="chat-list-shell">
  <app-sidebar-search
    [searchTerm]="searchTerm()"
    placeholder="Search or start a new chat"
    ariaLabel="Search chats"
    (searchTermChange)="onSearchTermChange($event)"
  />

  <div class="chat-list">
    @for (chat of filteredChats(); track chat.id()) {
    <button type="button" class="chat-list-item" [class.chat-list-item--active]="selectedChat()?.id() === chat.id()"
      (click)="onOpenChat(chat)">
      <div class="chat-list-item__avatar-wrap" [class.chat-list-item__avatar-wrap--ring]="chat.avatarRing()">
        <app-chat-avatar
          class="chat-list-item__avatar"
          [avatar]="chat.avatar()"
          [label]="chat.name()"
          alt="avatar"
        />
      </div>
      <div class="chat-list-item__content">
        <div class="chat-list-item__top">
          <strong>{{ chat.name() }}</strong>
          <div class="chat-list-item__actions">
            <time [class.chat-list-item__time--accent]="chat.highlightTime">
              @if (lastMessageTime(chat); as time) {
              {{ time | date: 'HH:mm' }}
              } @else {
              {{ chat.timeLabel || '' }}
              }
            </time>
          </div>
        </div>
        <div class="chat-list-item__bottom">
          <p>
            @if (chat.draftMessage().trim()) {
            <span class="chat-list-item__draft-label">Draft:</span>
            <span> {{ chat.draftMessage().trim() }}</span>
            }
            @else {
            {{ lastMessageText(chat) }}
            }
          </p>
          @if (chat.unreadCount()) {
          <span class="chat-list-item__badge">{{ chat.unreadCount() }}</span>
          }
        </div>
      </div>
    </button>
    } @empty {
    <div class="chat-list-empty">
      <p>No chats match your search</p>
    </div>
    }
  </div>
</div>
<button type="button" class="floating-compose" aria-label="New chat" (click)="onCreateChat()">
  <svg [lucideIcon]="composeIcon" aria-hidden="true"></svg>
</button>
