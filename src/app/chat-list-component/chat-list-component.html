<div class="chat-list-shell">
  <div class="sidebar-tools">
    <label class="search-box" for="chat-search">
      <lucide-angular [img]="searchIcon" class="search-box__icon" aria-hidden="true" />
      <input
        id="chat-search"
        type="text"
        name="chat-search"
        [ngModel]="searchTerm"
        (ngModelChange)="onSearchTermChange($event)"
        [placeholder]="'chatList.searchPlaceholder' | translate"
      />
    </label>
  </div>

  <div class="chat-list">
    @for (chat of filteredChats; track chat.id) {
      <button
        type="button"
        class="chat-list-item"
        [class.chat-list-item--active]="selectedChat?.id === chat.id"
        (click)="onOpenChat(chat)"
      >
        <div class="chat-list-item__avatar-wrap" [class.chat-list-item__avatar-wrap--ring]="chat.avatarRing">
        <div class="chat-list-item__avatar">
          @if (chat.avatar.type === 'image') {
            <img [src]="chat.avatar.value" alt="avatar" class="chat-list-item__avatar-img" />
          } @else {
            {{ chat.avatar.value }}
          }
        </div>
      </div>
        <div class="chat-list-item__content">
          <div class="chat-list-item__top">
            <strong>{{ chat.name }}</strong>
            <div class="chat-list-item__actions">
              <time [class.chat-list-item__time--accent]="chat.highlightTime">{{
                lastMessageTime(chat)
              }}</time>
            </div>
          </div>
          <div class="chat-list-item__bottom">
            <p>{{ lastMessageText(chat) || ('chatList.startConversation' | translate) }}</p>
            @if (chat.unreadCount) {
              <span class="chat-list-item__badge">{{ chat.unreadCount }}</span>
            }
          </div>
        </div>
      </button>
    } @empty {
      <div class="chat-list-empty">
        <p>{{ 'chatList.empty' | translate }}</p>
      </div>
    }
  </div>
</div>
<button
  type="button"
  class="floating-compose"
  [attr.aria-label]="'chatList.newChat' | translate"
  (click)="onCreateChat()"
>
  <lucide-angular [img]="composeIcon" aria-hidden="true" />
</button>
